function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - e.clientY),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakRadio, TweakColor, TweakButton });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --text-secondary: #7a6f63;

    }

      color: var(--text-secondary);

    .pl-add-form {

      border-radius: var(--radius);

      padding: 12px 14px;
      font-family: var(--font-sans);

    }

      color: var(--bg);

      font-weight: 700;
      padding: 0 18px;

    /* ── Filters ── */
    .pl-filters {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;

    .pl-filter-btn {
      font-family: var(--font-mono);

    .pl-filter-btn.active {
      color: var(--text-primary);
      border-color: var(--text-primary);
      background: var(--surface);
    }

    /* ── Task list ── */
    .pl-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .pl-item {
      display: flex;
      align-items: flex-start;

    }
    .pl-item:first-child { border-top: 1px solid var(--border-light); }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-6px); }

    /* Checkbox */
    .pl-check {

    .pl-progress-wrap {

      border-radius: 1px;
      transition: width 0.4s ease;
    }
  </style>
</head>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORAGE_KEY = 'punchlist_v1';

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [
      { id: 1, text: 'Inspect foundation cracks', done: false, added: Date.now() - 86400000 * 2 },
      { id: 2, text: 'Fix leaking roof flashing', done: true, added: Date.now() - 86400000 },
      { id: 3, text: 'Replace broken window seal', done: false, added: Date.now() - 3600000 },
    ];
  } catch { return []; }
}

function saveTasks(tasks) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch {}
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

let nextId = Date.now();

function PunchList({ tweaks }) {
  const [tasks, setTasks] = useState(loadTasks);
  const [input, setInput] = useState('');
  const [filter, setFilter] = useState('all');
  const inputRef = useRef(null);

  useEffect(() => { saveTasks(tasks); }, [tasks]);

  const addTask = () => {
    const text = input.trim();
    if (!text) return;
    setTasks(prev => [{ id: nextId++, text, done: false, added: Date.now() }, ...prev]);
    setInput('');
    inputRef.current?.focus();
  };

  const toggle = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
  const remove = (id) => setTasks(prev => prev.filter(t => t.id !== id));
  const clearDone = () => setTasks(prev => prev.filter(t => !t.done));

  const filtered = tasks.filter(t =>
    filter === 'all' ? true : filter === 'open' ? !t.done : t.done
  );

  const doneCount = tasks.filter(t => t.done).length;
  const openCount = tasks.filter(t => !t.done).length;
  const progress = tasks.length === 0 ? 0 : Math.round((doneCount / tasks.length) * 100);

  const showMeta = tweaks?.showDates !== false;

  return (
    <div>
      <div className="pl-header">
        <span className="pl-title">Punch List</span>
        <span className="pl-count">
          {tasks.length === 0 ? 'no items' : `${doneCount}/${tasks.length} done`}
        </span>
      </div>

      {tasks.length > 0 && (
        <div className="pl-progress-wrap">
          <div className="pl-progress-bar" style={{ width: `${progress}%` }}></div>
        </div>
      )}

      <div className="pl-add-form">
        <input
          ref={inputRef}
          className="pl-add-input"
          placeholder="Add a task…"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addTask()}
          maxLength={200}
        />
        <button className="pl-add-btn" onClick={addTask} aria-label="Add task">+</button>
      </div>

      {tasks.length > 0 && (
        <div className="pl-filters">
          {['all', 'open', 'done'].map(f => (
            <button
              key={f}
              className={`pl-filter-btn${filter === f ? ' active' : ''}`}
              onClick={() => setFilter(f)}
            >
              {f === 'all' ? `All ${tasks.length}` : f === 'open' ? `Open ${openCount}` : `Done ${doneCount}`}
            </button>
          ))}
        </div>
      )}

      <div className="pl-list">
        {filtered.length === 0 ? (
          <div className="pl-empty">
            <span className="pl-empty-mark">✓</span>
            {filter === 'done' ? 'Nothing completed yet' : filter === 'open' ? 'All items complete' : 'Your list is empty'}
          </div>
        ) : filtered.map(task => (
          <div key={task.id} className={`pl-item${task.done ? ' done' : ''}`}>
            <div
              className={`pl-check${task.done ? ' checked' : ''}`}
              onClick={() => toggle(task.id)}
              role="checkbox"
              aria-checked={task.done}
              tabIndex={0}
              onKeyDown={e => e.key === ' ' && toggle(task.id)}
            >
              <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                <path d="M1 4L4 7.5L10 1" stroke="#f5f0e8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <div className="pl-task-body">
              <span className="pl-task-text">{task.text}</span>
              {showMeta && (
                <div className="pl-task-meta">added {formatDate(task.added)}</div>
              )}
            </div>
            <button className="pl-delete" onClick={() => remove(task.id)} aria-label="Remove task">×</button>
          </div>
        ))}
      </div>

      {tasks.length > 0 && (
        <div className="pl-footer">
          <span className="pl-remaining">
            {openCount === 0 ? 'All done ✓' : `${openCount} item${openCount !== 1 ? 's' : ''} remaining`}
          </span>
          {doneCount > 0 && (
            <button className="pl-clear-btn" onClick={clearDone}>Clear done</button>
          )}
        </div>
      )}
    </div>
  );
}

const TWEAK_DEFAULTS = {
  "accentColor": "#c8401a",
  "showDates": true,
  "theme": "paper"
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const theme = tweaks.theme || 'paper';

  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'paper') {
      root.style.setProperty('--bg', '#f5f0e8');
      root.style.setProperty('--surface', '#faf7f2');
      root.style.setProperty('--border', '#d4cbbf');
      root.style.setProperty('--border-light', '#e8e0d4');
      root.style.setProperty('--text-primary', '#1a1714');
      root.style.setProperty('--text-secondary', '#7a6f63');
      root.style.setProperty('--text-done', '#b0a498');
      root.style.setProperty('--check-bg', '#1a1714');
      root.style.setProperty('--check-hover', '#3a3430');
    } else if (theme === 'dark') {
      root.style.setProperty('--bg', '#141210');
      root.style.setProperty('--surface', '#1e1c1a');
      root.style.setProperty('--border', '#3a3530');
      root.style.setProperty('--border-light', '#2a2826');
      root.style.setProperty('--text-primary', '#f0ebe2');
      root.style.setProperty('--text-secondary', '#7a7068');
      root.style.setProperty('--text-done', '#4a4440');
      root.style.setProperty('--check-bg', '#f0ebe2');
      root.style.setProperty('--check-hover', '#cfc8be');
    } else if (theme === 'white') {
      root.style.setProperty('--bg', '#ffffff');
      root.style.setProperty('--surface', '#fafafa');
      root.style.setProperty('--border', '#e0e0e0');
      root.style.setProperty('--border-light', '#f0f0f0');
      root.style.setProperty('--text-primary', '#111111');
      root.style.setProperty('--text-secondary', '#888888');
      root.style.setProperty('--text-done', '#bbbbbb');
      root.style.setProperty('--check-bg', '#111111');
      root.style.setProperty('--check-hover', '#333333');
    }
  }, [theme]);

  return (
    <>
      <PunchList tweaks={tweaks} />
      <TweaksPanel>
        <TweakSection label="Appearance" />
        <TweakRadio label="Theme" value={tweaks.theme} onChange={v => setTweak('theme', v)}
          options={['paper', 'dark', 'white']} />
        <TweakToggle label="Show dates" value={tweaks.showDates} onChange={v => setTweak('showDates', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
